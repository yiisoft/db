on:
  pull_request:
    paths: &paths
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/db-mysql.yml'
      - 'composer.json'
      - 'phpunit.xml.dist'

  push:
    branches: ['master']
    paths: *paths

name: db-mysql

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: MySQL ${{ matrix.mysql }}

    strategy:
      matrix:
        php:
          - 8.5
        mysql:
          - 5.7
          - latest
        include:
          - php: 8.1
            mysql: 9
          - php: 8.2
            mysql: 9
          - php: 8.3
            mysql: 9
          - php: 8.4
            mysql: 9

    uses: yiisoft/actions/.github/workflows/db-mysql.yml@ab62d6b3b0e0cff6c9724ec5a395bedb41c639a2
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      mysql: ${{ matrix.mysql }}
      php: >-
        [${{ matrix.php }}]
